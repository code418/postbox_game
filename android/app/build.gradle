plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "org.jetbrains.kotlin.android"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.code418.postbox_game"
    compileSdk 35
    ndkVersion "27.0.12077973"

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lint {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId "com.code418.postbox_game"
        minSdk 23
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "device"
    productFlavors {
        phone {
            dimension "device"
        }
        wear {
            dimension "device"
            minSdk 30 // Wear OS 3+ requires API 30
            // Sit in a separate versionCode band so Play accepts both AABs
            // for the same applicationId in one release.
            versionCode flutterVersionCode.toInteger() + 10000
            versionNameSuffix "-wear"
        }
    }

    signingConfigs {
        release {
            keyAlias keyProperties['keyAlias']
            keyPassword keyProperties['keyPassword']
            storeFile keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword keyProperties['storePassword']
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.multidex:multidex:2.0.1"
    // Android Auto "quick claim" surface. Uses the Car App Library templated
    // UI (MessageTemplate / ActionStrip) — no Flutter runtime is loaded in the
    // car; the car screen talks to Firebase Functions directly. Scoped to the
    // phone flavor so the wear AAB does not link these libraries.
    phoneImplementation 'androidx.car.app:app:1.4.0'
    phoneImplementation 'androidx.car.app:app-projected:1.4.0'
    phoneImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
    phoneImplementation platform('com.google.firebase:firebase-bom:33.7.0')
    phoneImplementation 'com.google.firebase:firebase-auth'
    phoneImplementation 'com.google.firebase:firebase-functions'
    phoneImplementation 'com.google.android.gms:play-services-location:21.3.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.4.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
    }
}

// firebase-perf and crashlytics Gradle plugins removed — SDKs not used in Dart code
// and perf-plugin:1.4.2 is incompatible with AGP 8.x
